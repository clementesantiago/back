parameters:
  branchName: ""
  projectName: ""
  debug: ""
  globalEnvironmentGroup: ""
  globalProjectGroup: ""
  env: ""
  poolName: ""
  aroNameSpace: ""
  deleteDeployment: ""

jobs:
  - deployment: Deploy
    displayName: Deploy Solution
    environment: ${{ parameters.env }}
    pool: ${{ parameters.poolName }}
    variables:
      - group: ${{ parameters.globalEnvironmentGroup }}
      - group: ${{ parameters.globalProjectGroup }}
      - name: branchName
        value: ${{ parameters.branchName }}
      - name: buildId
        value: $(Build.BuildId)
      - name: tag
        value: ${{ parameters.branchName }}-$(Build.BuildId)
      - name: projectName
        value: ${{ parameters.projectName }}
      - name: aroNameSpace
        value: ${{ parameters.aroNameSpace }}
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: none
            - download: current
              artifact: drop
            - script: |
                echo buildId: $(buildId)
                echo projectName: $(projectName)        
                echo branchName: $(branchName)
                echo vmImageName: $(vmImageName)
                echo DefaultWorkingDirectory: $(System.DefaultWorkingDirectory)
                echo SourcesDirectory: $(Build.SourcesDirectory)
                pwd
                echo ========================
                cat $(Pipeline.Workspace)/drop/DeploymentBack.yml
              displayName: "Debug - a multi-line script"
              condition: eq('${{ parameters.debug }}', 'true')

            # Pre-deployment validation for Python artifacts
            - script: |
                echo "====== Validating deployment artifacts ======"
                echo "Listing artifact contents:"
                ls -R $(Pipeline.Workspace)/drop
                
                if [ -f "$(Pipeline.Workspace)/drop/requirements.txt" ]; then
                  echo "✓ requirements.txt found in artifact"
                  echo "====== Requirements content ======"
                  cat $(Pipeline.Workspace)/drop/requirements.txt
                  
                  echo "====== Validating requirements.txt syntax ======"
                  while IFS= read -r line || [ -n "$line" ]; do
                    [ -z "$line" ] || [[ "$line" =~ ^# ]] && continue
                    if ! echo "$line" | grep -qE '^[a-zA-Z0-9_-]+'; then
                      echo "WARNING: Invalid requirement format: $line"
                    fi
                  done < $(Pipeline.Workspace)/drop/requirements.txt
                  echo "✓ requirements.txt validation passed"
                fi
                
                if [ -f "$(Pipeline.Workspace)/drop/main.py" ] || [ -f "$(Pipeline.Workspace)/drop/app.py" ]; then
                  echo "✓ Python entry point found"
                fi
                
                if [ -f "$(Pipeline.Workspace)/drop/Dockerfile" ]; then
                  echo "✓ Dockerfile found"
                  echo "Validating Dockerfile syntax..."
                  grep -E "^FROM|^RUN.*pip install|^EXPOSE|^CMD" $(Pipeline.Workspace)/drop/Dockerfile || echo "Checking basic Dockerfile structure..."
                fi
                
                echo "====== Artifact validation completed ======"
              displayName: "Validate deployment artifacts"
              condition: eq('${{ parameters.debug }}', 'true')
            
            # simple sanity check for Python artifacts
            - script: |
                echo "====== Final pre-deployment checks-- Listing artifact contents: ======" 
                ls -R $(Pipeline.Workspace)/drop
                if [ -f "$(Pipeline.Workspace)/drop/requirements.txt" ]; then
                  echo "requirements.txt found in artifact"
                fi
              displayName: "Validate Python artifact"
              condition: eq('${{ parameters.debug }}', 'true')
            
            - task: oc-cmd@3
              inputs:
                connectionType: "OpenShift Connection Service"
                openshiftService: ${{ parameters.aroconnection }}
                version: "4.9.7"
                cmd: "oc delete -f $(Pipeline.Workspace)/drop/DeploymentBack.yml -n ${{ variables.aroNameSpace }}"
              condition: eq('${{ parameters.deleteDeployment }}', 'Yes')
              displayName: "Delete Deployment"

            - task: oc-cmd@3
              inputs:
                connectionType: "OpenShift Connection Service"
                openshiftService: ${{ parameters.aroconnection }}
                version: "4.9.7"
                cmd: "oc apply -f $(Pipeline.Workspace)/drop/DeploymentBack.yml -n ${{ variables.aroNameSpace }}"
              displayName: "Apply Deployment"
           
            - task: oc-cmd@3
              inputs:
                connectionType: "OpenShift Connection Service"
                openshiftService: ${{ parameters.aroconnection }}
                version: "4.9.7"
                cmd: "oc logout"
              displayName: "Logout OC"

